<html>
<head>
    <title>Happy Wines Brand Page</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        html {
            scroll-behavior: smooth;
        }
        body {
            font-family:Verdana, Geneva, Tahoma, sans-serif;
            min-height: 100vh
        }
        a {
            text-decoration: none;
            color:black;
        }

        a:hover {
            color: black;
            text-decoration: none;
        }

        .container {
            background: #C00707;
            color: white;
            padding: 60px 40px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 40px;
            border: 2px solid white;
        }

        .btn-group {
            margin-top: 30px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 50px;
            
        }

        button {
            background-color: #f63e31;
            color: #8B4513;
            border: 2px solid white;
            padding: 12px 30px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 50px;
            transition: all 0.3s;
            min-width: 150px;
        }

        .btn-light:hover {
            background-color: white;
            color:bisque;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px;
        }

        .long-line-break {
            margin-bottom: 10em;
        }

        
     
        .image-gallery {
            text-align: center; 
            margin-top: 20px;
        }

        .image-item {
            display: inline-block; 
            vertical-align: top;
            margin: 30px;          
            text-align: center;     
        }

        .image-item img {
            height: 400px; 
            width: auto;   
            border-radius: 10px;
            border: 2px solid white;
            display: block;
            margin: 0 auto; 
        }


        audio {
        position: fixed;
        bottom: 20px;
        left: 20px;
        opacity: 50%;
    }
    </style>
</head>

<body style="background-color:#8b0000; color:white;">

    <div class="container text-center" style="padding:80px;">

        <div class="navigation">
            <div class="nav-bar">
                <button class="btn btn-light"><a href="inside_bootstrapped.html">HOME</a></button>
                <br>
            </div>
        </div>

        <h1 class="display-4">Happy Wines</h1>
        <p> Welcome to Happy Wines! Happy Wines is the collector and producer of premium wines.</p>

        <div class="btn-group mt-3">
            <button class="btn btn-light"><a href="#Carmen">Carmen Duran</a></button>
            <button class="btn btn-light"><a href="#Czairra">Czairra Ricamata</a></button>
            <button class="btn btn-light"><a href="#Andrea">Andrea Tuazon</a></button>
        </div>

    </div>

    <br>
    <br>
    
    
    <div class="image-gallery">
        <div class="image-item" id="Carmen">
            <img src="wine 2 branding.webp" alt="Carmen">
            <p><b>Carmen Duran</b><br>Head Wine Collector</p>
        </div>

        <div class="image-item" id="Czairra">
            <img src="branding 1.webp" alt="Czairra">
            <p><b>Czairra Ricamata</b><br>Production Manager</p>
        </div>

        <div class="image-item" id="Andrea">
            <img src="branding 2.jpg" alt="Andrea">
            <p><b>Andrea Tuazon</b><br>Marketing Director</p>
        </div>
    </div>

    <audio controls autoplay loop>
        <source src="pharrell-williams-happy-video.mp3" type="audio/mpeg">
    </audio>

</body>
</html>
